<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F5257">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OrthoLog">
<title>OrthoLog — Orthopedic Oncology Records</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F5257'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Georgia'%3EO%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
<style>
:root{
  --ink:#0F5257; --ink-deep:#0A3A3E;
  --paper:#FAFAF8; --card:#FFFFFF;
  --text:#1F2933; --muted:#5C6670; --line:#E4E4DE;
  --amber:#B45309; --amber-bg:#FEF3E2;
  --green:#15803D; --green-bg:#EAF6EE;
  --red:#B91C1C; --red-bg:#FDECEC;
  --blue:#1D4ED8; --blue-bg:#EAF0FE;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  background:var(--paper);color:var(--text);min-height:100vh;line-height:1.45}
#app{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
/* top bar */
#topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:8px}
#topbar .back,#topbar .menu{background:none;border:none;color:#fff;font-size:24px;line-height:1;
  padding:4px 8px 4px 0;cursor:pointer}
#topbar .back{display:none;font-size:26px}
#topbar .back.show{display:block}
#topbar h1{font-size:18px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar .sub{font-size:11px;opacity:.75;font-weight:400;display:block;letter-spacing:.4px}
/* sidebar */
#scrim{position:fixed;inset:0;background:rgba(10,20,22,.5);z-index:90;display:none}
#scrim.show{display:block}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:250px;background:var(--ink-deep);color:#fff;
  z-index:95;transform:translateX(-102%);transition:transform .25s ease;overflow-y:auto;
  padding:calc(18px + env(safe-area-inset-top)) 0 24px}
#sidebar.show{transform:translateX(0)}
#sidebar .s-head{padding:6px 18px 14px;font-size:17px;font-weight:800;letter-spacing:.3px}
#sidebar .s-head span{display:block;font-size:11px;font-weight:400;opacity:.7}
.s-item{display:block;width:100%;text-align:left;padding:13px 18px;color:#fff;background:none;
  border:none;border-left:3px solid transparent;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit}
.s-item.active{background:rgba(255,255,255,.1);border-left-color:#fff}
.s-item .s-note{display:block;font-size:11px;font-weight:400;opacity:.65;margin-top:1px}
/* layout */
main{padding:16px 16px 8px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink);margin-bottom:6px}
.section-h{font-size:16px;font-weight:700;margin:22px 0 10px;display:flex;align-items:baseline;justify-content:space-between}
.section-h .count{font-size:13px;color:var(--muted);font-weight:500}
.muted{color:var(--muted);font-size:13px}
.small{font-size:13px}
.empty{color:var(--muted);font-size:14px;padding:18px 4px;text-align:center}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.stat b{display:block;font-size:24px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.stat.hot b{color:var(--red)}
.stat span{font-size:10.5px;color:var(--muted);letter-spacing:.3px}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;
  padding:10px 18px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit;background:var(--ink);color:#fff;width:100%}
.btn:active{transform:scale(.985)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--ink)}
.btn.danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red)}
.btn.subtle{background:#F1F1EC;color:var(--text);border:1px solid var(--line)}
.btn.wa{background:#128C4A;color:#fff}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-row .btn{flex:1}
.mini{min-height:34px;padding:5px 12px;font-size:13px;border-radius:9px;width:auto}
.linkbtn{background:none;border:none;color:var(--red);font-size:13px;font-weight:600;padding:6px 4px;cursor:pointer;font-family:inherit}
/* forms */
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 4px;letter-spacing:.2px}
input,textarea,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;
  font-size:16px;font-family:inherit;background:#fff;color:var(--text)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink)}
textarea{min-height:76px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vgroup{display:flex;gap:6px;align-items:stretch}
.vgroup textarea,.vgroup input{flex:1}
.voice-btn{background:var(--blue-bg);border:1px solid var(--blue);color:var(--blue);padding:8px 10px;
  border-radius:9px;cursor:pointer;font-size:18px;flex:none;min-width:44px;display:flex;align-items:center;justify-content:center}
.voice-btn.listening{background:var(--amber-bg);color:var(--amber);border-color:var(--amber);animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
details.adder{margin-bottom:12px}
details.adder>summary{list-style:none;cursor:pointer;user-select:none;background:var(--card);
  border:1.5px dashed var(--ink);color:var(--ink);border-radius:12px;padding:11px 16px;
  font-size:15px;font-weight:600;text-align:center}
details.adder>summary::-webkit-details-marker{display:none}
details.adder[open]>summary{border-style:solid;border-radius:12px 12px 0 0;background:var(--ink);color:#fff}
details.adder .body{background:var(--card);border:1.5px solid var(--ink);border-top:none;
  border-radius:0 0 12px 12px;padding:4px 16px 16px}
/* rows & tags */
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.row .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.row .name{font-size:16px;font-weight:700}
.row .when{font-size:12.5px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.row .body-text{font-size:14px;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.row .foot{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;align-items:center}
.row.b-red{border-left:4px solid var(--red)}
.row.b-amber{border-left:4px solid var(--amber)}
.row.b-green{border-left:4px solid var(--green)}
.tag{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.3px}
.tag.amber{background:var(--amber-bg);color:var(--amber)}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.blue{background:var(--blue-bg);color:var(--blue)}
.tag.gray{background:#EEEEE9;color:var(--muted)}
.tag.red{background:var(--red-bg);color:var(--red)}
/* readiness dots */
.ready-strip{display:flex;gap:14px;margin-top:10px}
.rdot{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 4px}
.rdot .c{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--line);background:#fff;transition:all .15s}
.rdot.on .c{border-color:var(--green);background:var(--green)}
.rdot span{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px}
.rdot.on span{color:var(--green)}
.row.all-ready{border-left:4px solid var(--green)}
/* care pathway */
.pw{padding:6px 2px 2px}
.pw-row{display:flex;gap:12px;position:relative;padding-bottom:16px}
.pw-row:last-child{padding-bottom:2px}
.pw-row::before{content:'';position:absolute;left:11px;top:26px;bottom:-2px;width:2px;background:var(--line)}
.pw-row:last-child::before{display:none}
.pw-row.done::before{background:var(--ink)}
.pw-dot{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--line);background:#fff;flex:none;cursor:pointer;padding:0;position:relative;z-index:1;margin-top:1px}
.pw-row.done .pw-dot{background:var(--ink);border-color:var(--ink)}
.pw-row.na .pw-dot{border-style:dashed;background:#F1F1EC}
.pw-row.current .pw-dot{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-bg)}
.pw-main{flex:1;min-width:0}
.pw-name{font-size:14.5px;font-weight:600;padding-top:3px}
.pw-row.done .pw-name{color:var(--ink)}
.pw-row.na .pw-name{color:var(--muted);text-decoration:line-through}
.pw-row.current .pw-name{color:var(--amber)}
.pw-extra{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
input.pw-date{width:auto;font-size:13.5px;padding:5px 9px;border-radius:8px}
.pw-na{min-height:28px;padding:3px 10px;font-size:12px;border-radius:8px;width:auto;background:#F1F1EC;
  color:var(--muted);border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:600}
/* attachments */
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.thumb-w{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);aspect-ratio:1;background:#EFEFEA;cursor:pointer}
.thumb-w img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-doc{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;color:var(--muted);gap:4px}
.thumb-doc i{font-style:normal}
.thumb-doc span{font-size:10px;font-weight:600;padding:0 6px;text-align:center;overflow:hidden;max-width:100%;white-space:nowrap;text-overflow:ellipsis}
.ttag{position:absolute;left:4px;bottom:4px;background:rgba(15,82,87,.92);color:#fff;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:.4px}
.tdl{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:7px;padding:4px 8px;font-size:13px;cursor:pointer}
#viewer{position:fixed;inset:0;z-index:150;background:rgba(10,20,22,.95);display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#viewer.show{display:flex}
#viewerImg{max-width:100%;max-height:66vh;border-radius:10px;background:#000;object-fit:contain}
#viewerMeta{color:#fff;font-size:13.5px;margin-top:12px;text-align:center;max-width:520px;white-space:pre-wrap}
#viewer .btn-row{width:100%;max-width:340px}
/* patient card */
.pcard{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;font-family:inherit}
.pcard:active{background:#F4F4EF}
.pcard .nm{font-size:16.5px;font-weight:700;color:var(--text)}
.pcard .meta{font-size:13px;color:var(--muted);margin-top:2px}
.pcard .dx{font-size:13.5px;margin-top:4px;color:var(--text)}
.pcard .tag{margin-top:7px;margin-right:6px}
/* banners, misc */
.banner{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start}
.banner.amber{background:var(--amber-bg);color:var(--amber);border:1px solid #F0D9B8}
.banner.red{background:var(--red-bg);color:var(--red);border:1px solid #F2C7C7}
.banner b{font-weight:700}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--card);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;background:none;border:none;padding:11px 2px 9px;cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
#nav button .pip{width:5px;height:5px;border-radius:50%;background:transparent}
#nav button.active{color:var(--ink)}
#nav button.active .pip{background:var(--ink)}
#nav .ndot{position:absolute;top:7px;right:calc(50% - 18px);width:8px;height:8px;border-radius:50%;background:var(--red)}
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + env(safe-area-inset-bottom));z-index:170;
  background:var(--ink-deep);color:#fff;font-size:14px;font-weight:600;padding:10px 18px;border-radius:99px;
  opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center}
#toast.show{opacity:1}
#lock{position:fixed;inset:0;z-index:200;background:var(--ink);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff}
#lock.show{display:flex}
#lock h2{font-size:22px;margin-bottom:4px}
#lock p{font-size:13px;opacity:.75;margin-bottom:20px}
#lock input{max-width:220px;text-align:center;font-size:22px;letter-spacing:8px;border-radius:12px;border:none;margin-bottom:12px}
#lock .btn{max-width:220px;background:#fff;color:var(--ink)}
#lock .forgot{background:none;border:none;color:#fff;opacity:.6;font-size:12.5px;margin-top:18px;text-decoration:underline;cursor:pointer;font-family:inherit}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{min-height:32px;padding:4px 12px;font-size:13px;border-radius:99px;width:auto;background:#F1F1EC;
  color:var(--text);border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:600}
.loader{display:inline-block;width:22px;height:22px;border:3px solid var(--line);border-top:3px solid var(--ink);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-note{background:var(--blue-bg);color:var(--blue);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:10px}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="lock">
  <h2>OrthoLog</h2>
  <p>Enter your PIN to open records</p>
  <input id="lockPin" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
  <button class="btn" onclick="unlock()">Unlock</button>
  <button class="forgot" onclick="forgotPin()">Forgot PIN?</button>
</div>

<div id="scrim" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="s-head">OrthoLog<span>Orthopedic oncology · v4</span></div>
  <button class="s-item" data-s="home" onclick="go('home')">Dashboard</button>
  <button class="s-item" data-s="intake" onclick="go('intake')">Referral intake<span class="s-note">Scan WhatsApp referrals — auto-fill</span></button>
  <button class="s-item" data-s="active" onclick="go('active')">Active patients<span class="s-note">Who needs action, who is going quiet</span></button>

  <button class="s-item" data-s="schedule" onclick="go('schedule')">Schedule</button>

</div>

<div id="app">
  <div id="topbar">
    <button class="menu" onclick="openSidebar()">☰</button>
    <button class="back" id="backBtn" onclick="goBack()">‹</button>
    <h1 id="title">OrthoLog<span class="sub">Orthopedic oncology records · v4 · on-device</span></h1>

  <main id="view"></main>
  <nav id="nav">
    <button data-v="home" onclick="go('home')"><span class="pip"></span>Home</button>

</div>

<div id="viewer">
  <img id="viewerImg" alt="">
  <div id="viewerMeta"></div>
  <div class="btn-row">
    <button class="btn subtle" id="viewerDl">Download</button>
    <button class="btn danger" id="viewerDel">Delete</button>
    <button class="btn subtle" onclick="closeViewer()">Close</button>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importJSON(event)">

<script>
/* ============================================================
   OrthoLog v4 — single-file EMR for orthopedic oncology
   New in v4: referral OCR intake · active-patient urgency board
   · WhatsApp message centre · next-action suggestions
   ============================================================ */

/* ================= storage (localStorage + fallback) ================= */
var MEMORY_ONLY=false;
var store=(function(){
  try{
    var t='__t'; localStorage.setItem(t,'1'); localStorage.removeItem(t);
    return localStorage;
  }catch(e){
    MEMORY_ONLY=true;
    var m={};
    return {getItem:function(k){return (k in m)?m[k]:null;},
            setItem:function(k,v){m[k]=String(v);},
            removeItem:function(k){delete m[k];}};
  }
})();

var KEY='orthoEMR_v1';
function seed(){return {patients:[],encounters:[],imaging:[],biopsies:[],treatments:[],
  surgeries:[],implants:[],appointments:[],followups:[],attachments:[],
  referrals:[],messages:[],lastContact:{},settings:{clinicName:'',clinicPhone:'',docName:''},
  pin:null,lastBackup:null};}
function load(){
  try{
    var raw=store.getItem(KEY);
    if(!raw) return seed();
    var d=JSON.parse(raw);
    var s=seed();
    for(var k in s){ if(d[k]===undefined) d[k]=s[k]; }
    if(!d.settings) d.settings={clinicName:'',clinicPhone:'',docName:''};
    return d;
  }catch(e){ return seed(); }
}
var db=load();
function save(){ store.setItem(KEY, JSON.stringify(db)); }

/* ================= image store: IndexedDB + memory fallback ================= */
var IDB_OK=(typeof indexedDB!=='undefined');
var _idb=null;
var _memImgs={};
function idbOpen(){
  return new Promise(function(res){
    if(!IDB_OK){ res(null); return; }
    if(_idb){ res(_idb); return; }
    try{
      var rq=indexedDB.open('orthoEMR_files',1);
      rq.onupgradeneeded=function(e){ e.target.result.createObjectStore('imgs'); };
      rq.onsuccess=function(e){ _idb=e.target.result; res(_idb); };
      rq.onerror=function(){ IDB_OK=false; res(null); };
    }catch(e){ IDB_OK=false; res(null); }
  });
}
function imgPut(id,blob){
  return idbOpen().then(function(d){
    if(!d){ _memImgs[id]=blob; return; }
    return new Promise(function(res,rej){
      var tx=d.transaction('imgs','readwrite');
      tx.objectStore('imgs').put(blob,id);
      tx.oncomplete=function(){res();};
      tx.onerror=function(){rej(tx.error);};
    });
  });
}
function imgGet(id){
  return idbOpen().then(function(d){
    if(!d){ return _memImgs[id]; }
    return new Promise(function(res){
      var rq=d.transaction('imgs').objectStore('imgs').get(id);
      rq.onsuccess=function(){res(rq.result);};
      rq.onerror=function(){res(undefined);};
    });
  });
}
function imgDel(id){
  return idbOpen().then(function(d){
    if(!d){ delete _memImgs[id]; return; }
    return new Promise(function(res){
      var tx=d.transaction('imgs','readwrite');
      tx.objectStore('imgs').delete(id);
      tx.oncomplete=function(){res();};
      tx.onerror=function(){res();};
    });
  });
}
function imgClearAll(){
  return idbOpen().then(function(d){
    _memImgs={};
    if(!d) return;
    return new Promise(function(res){
      var tx=d.transaction('imgs','readwrite');
      tx.objectStore('imgs').clear();
      tx.oncomplete=function(){res();};
      tx.onerror=function(){res();};
    });
  });
}
function compressImage(file){
  return new Promise(function(res){
    if(!/^image\//.test(file.type||'')){ res(file); return; }
    try{
      var img=new Image();
      var url=URL.createObjectURL(file);
      img.onload=function(){
        var MAX=1600, w=img.width, h=img.height;
        if(Math.max(w,h)>MAX){ var r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        URL.revokeObjectURL(url);
        if(c.toBlob){ c.toBlob(function(b){ res(b||file); },'image/jpeg',0.72); }
        else res(file);
      };
      img.onerror=function(){ URL.revokeObjectURL(url); res(file); };
      img.src=url;
    }catch(e){ res(file); }
  });
}

/* ================= helpers ================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function localYMD(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){ return localYMD(new Date()); }
function fmtD(s){ if(!s) return '—';
  var d=new Date(s.length===10 ? s+'T00:00' : s);
  return isNaN(d)?'—':d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDT(s){ if(!s) return '—';

function touchContact(pid){ if(pid){ db.lastContact[pid]=todayStr(); } }
function lastContactDays(p){

var PATHWAY=[
  {k:'consult',      n:'First consultation'},
  {k:'imaging',      n:'Imaging'},
  {k:'bx_plan',      n:'Biopsy planning'},
  {k:'biopsy',       n:'Surgical biopsy'},
  {k:'histo',        n:'Histopathology report'},
  {k:'neo_chemo',    n:'Pre-op chemotherapy', opt:true},
  {k:'surg_plan',    n:'Surgical planning & posting'},
  {k:'surgery',      n:'Definitive surgery'},
  {k:'postop_notes', n:'Post-op notes'},
  {k:'postop_visit', n:'Post-op visit'},
  {k:'sutures',      n:'Suture removal'},
  {k:'adj_chemo',    n:'Post-op chemotherapy', opt:true},
  {k:'followup',     n:'Regular follow-up'}
];
var STAGE_ACTION={
  consult:'Record the first consultation',
  imaging:'Order or chase imaging',
  bx_plan:'Plan the biopsy',
  biopsy:'Do or chase the surgical biopsy',
  histo:'Chase the histopathology report',
  neo_chemo:'Start or review pre-op chemo',
  surg_plan:'Plan and post for surgery',
  surgery:'Definitive surgery pending',
  postop_notes:'Write the post-op notes',
  postop_visit:'Book the post-op visit',
  sutures:'Suture removal due',
  adj_chemo:'Start or review post-op chemo',
  followup:'Schedule the next follow-up'
};
function pwState(p){ return p.pathway||{}; }
function currentStage(p){
  var s=pwState(p);
  for(var i=0;i<PATHWAY.length;i++){
    var st=s[PATHWAY[i].k];
    if(!(st&&(st.done||st.na))) return PATHWAY[i];
  }
  return null;
}
function nextAction(p){
  var cur=currentStage(p);
  return cur ? (STAGE_ACTION[cur.k]||cur.n) : 'On regular follow-up';
}
function pwToggle(pid,k){
  var p=findP(pid); if(!p) return;
  p.pathway=p.pathway||{};
  var st=p.pathway[k]||{};
  if(st.done||st.na){ p.pathway[k]={}; }
  else{ p.pathway[k]={done:true,date:todayStr()}; touchContact(pid); }
  save(); render();
}
function pwNA(pid,k){
  var p=findP(pid); if(!p) return;
  p.pathway=p.pathway||{};
  var st=p.pathway[k]||{};
  p.pathway[k]= st.na ? {} : {na:true};
  save(); render();
}
function pwDate(pid,k,v){
  var p=findP(pid); if(!p) return;
  p.pathway=p.pathway||{};
  p.pathway[k]=p.pathway[k]||{done:true};
  p.pathway[k].date=v; save();
}
function pathwayHTML(p){
  var s=pwState(p);
  var cur=currentStage(p);
  var doneCount=PATHWAY.filter(function(st){var x=s[st.k];return x&&(x.done||x.na);}).length;
  var h='<details class="adder"><summary>Care pathway · '+
    (cur?esc(cur.n):'Complete — on follow-up')+' ('+doneCount+'/'+PATHWAY.length+')</summary>'+
    '<div class="body"><div class="pw">';
  PATHWAY.forEach(function(st){
    var x=s[st.k]||{};
    var cls=x.done?'done':(x.na?'na':(cur&&cur.k===st.k?'current':''));
    h+='<div class="pw-row '+cls+'">'+
      '<button class="pw-dot" onclick="pwToggle(\''+p.id+'\',\''+st.k+'\')"></button>'+
      '<div class="pw-main"><div class="pw-name">'+esc(st.n)+'</div>';
    if(x.done){
      h+='<div class="pw-extra"><input class="pw-date" type="date" value="'+esc(x.date||todayStr())+'" '+
         'onchange="pwDate(\''+p.id+'\',\''+st.k+'\',this.value)"></div>';
    }else if(st.opt&&!x.na){
      h+='<div class="pw-extra"><button class="pw-na" onclick="pwNA(\''+p.id+'\',\''+st.k+'\')">Not applicable</button></div>';
    }else if(x.na){
      h+='<div class="pw-extra"><button class="pw-na" onclick="pwNA(\''+p.id+'\',\''+st.k+'\')">Undo N/A</button></div>';
    }
    h+='</div></div>';
  });
  h+='<div class="muted small">Tap a circle to mark done (today). Tap again to undo. Correct the date for old records.</div>';
  h+='</div></div></details>';
  return h;
}

  if(!SR){ toast('Voice input not supported in this browser'); return; }
  var field=document.getElementById(fieldId); if(!field) return;
  try{
    var rec=new SR();
    rec.continuous=false; rec.lang='en-IN';
    if(btn) btn.classList.add('listening');
    rec.onresult=function(e){
      var text='';
      for(var i=e.resultIndex;i<e.results.length;i++){ text+=e.results[i][0].transcript+' '; }
      field.value=(field.value+' '+text.trim()).trim();
      if(btn) btn.classList.remove('listening');
    };
    rec.onerror=function(){ if(btn) btn.classList.remove('listening'); };
    rec.onend=function(){ if(btn) btn.classList.remove('listening'); };
    rec.start();
  }catch(e){ if(btn) btn.classList.remove('listening'); toast('Mic unavailable'); }
}

function startOCR(ev){
  var f=ev.target.files && ev.target.files[0];
  if(!f) return;
  if(typeof Tesseract==='undefined'){
    toast('OCR library not loaded — check internet and retry');
    return;
  }
  var zone=document.getElementById('ocrZone');
  zone.innerHTML='<div class="card" style="text-align:center"><div class="loader"></div>'+
    '<div class="small" style="margin-top:10px" id="ocrStatus">Reading document…</div></div>';
  compressImage(f).then(function(blob){
    _intakeFileBlob=blob; _intakeFileMime=blob.type||f.type||''; _intakeFileName=f.name||'referral';
    return Tesseract.recognize(blob,'eng',{logger:function(m){
      var s=document.getElementById('ocrStatus');
      if(s && m.status){ s.textContent=m.status+(m.progress?' '+Math.round(m.progress*100)+'%':''); }
    }});
  }).then(function(result){
    var text=(result&&result.data&&result.data.text)||'';
    showOCRForm(extractPatientData(text));
  }).catch(function(){
    zone.innerHTML='<div class="banner red"><div><b>Could not read that image.</b> Try a clearer, well-lit photo — or add the patient manually and attach the image to their record.</div></div>';
  });
  ev.target.value='';
}
function extractPatientData(text){
  var data={name:'',age:'',sex:'',phone:'',address:'',diagnosis:'',referrer:'',raw:(text||'').trim()};
  var lines=(text||'').split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
  function after(line){ var i=line.indexOf(':'); return i>=0?line.slice(i+1).trim():line.trim(); }
  lines.forEach(function(line){
    if(!data.name && /(patient'?s?\s*name|name\s*[:\-])/i.test(line)){
      data.name=after(line).replace(/^(mr|mrs|ms|shri|smt|master)\.?\s+/i,'').replace(/[|_]+/g,' ').trim().slice(0,60);
    }
    if(!data.age){
      var m=line.match(/(\d{1,3})\s*(?:y(?:ea)?rs?|yo)\b/i);
      if(!m && /\bage\b/i.test(line)) m=line.match(/(\d{1,3})/);
      if(m) data.age=m[1];
    }
    if(!data.sex){
      if(/\bfemale\b/i.test(line)||/\bf\s*[\/,]/i.test(line)) data.sex='Female';
      else if(/\bmale\b/i.test(line)||/\bm\s*[\/,]/i.test(line)) data.sex='Male';
    }
    if(!data.phone){
      var pm=line.replace(/[\s\-()\.]/g,'').match(/(?:\+?91)?([6-9]\d{9})/);
      if(pm) data.phone=pm[1];
    }
    if(!data.address && /add(ress)?\s*[:\-]/i.test(line)) data.address=after(line).slice(0,120);
    if(!data.diagnosis && /(diagnosis|impression|provisional|c\/o|dx)\s*[:\-]?/i.test(line)){
      var dx=after(line).slice(0,160);
      if(dx.length>3) data.diagnosis=dx;
    }
    if(!data.referrer){
      var dm=line.match(/dr\.?\s+[A-Za-z][A-Za-z .]{2,40}/i);
      if(dm) data.referrer=dm[0].trim();
    }
  });
  return data;
}

        '<span class="when">'+x.days+' day'+(x.days===1?'':'s')+' quiet</span></div>'+
        (p.dx?'<div class="small">'+esc(p.dx)+'</div>':'')+
        '<div class="small" style="margin-top:4px"><b>Next:</b> '+esc(nextAction(p))+'</div>'+
        '<div class="foot"><span class="tag '+(tone==='red'?'red':(tone==='amber'?'amber':'green'))+'">'+tagText+'</span>'+
        '<button class="btn subtle mini" onclick="markContacted(\''+p.id+'\')">Contacted</button>'+
        '<button class="btn subtle mini" onclick="messagePatient(\''+p.id+'\')">Message</button>'+
        '<button class="btn subtle mini" onclick="openPatient(\''+p.id+'\')">Open</button></div></div>';
    }).join('');
    return s;
  }
  h+=section('Going quiet — act now',buckets.urgent,'red','14+ days');
  h+=section('Watch list',buckets.watch,'amber','7–13 days');
  h+=section('Recently seen',buckets.ok,'green','On track');
  return h;
}

function viewPatients(){

    .filter(function(p){ if(!q) return true;

function patientListHTML(list){

  return list.map(function(p){

    var bucket=urgencyBucket(days);
    return '<button class="pcard" onclick="openPatient(\''+p.id+'\')">'+
      '<div class="nm">'+esc(p.name)+'</div>'+
      '<div class="meta">'+esc(p.age?p.age+' yrs':'')+(p.age&&p.sex?' · ':'')+esc(p.sex||'')+

      '<span class="tag '+(cur?'amber':'green')+'">'+(cur?'Next: '+esc(cur.n):'Pathway complete')+'</span>'+

       (bucket==='watch'?'<span class="tag amber">'+days+' d quiet</span>':''))+

function renderListOnly(){
  var q=state.q.toLowerCase();
  var list=db.patients.slice().sort(function(a,b){return a.name.localeCompare(b.name);})
    .filter(function(p){ if(!q) return true;
      return (p.name+' '+(p.phone||'')+' '+(p.dx||'')+' '+(p.addr||'')).toLowerCase().indexOf(q)>=0;});

function addPatient(){
  if(!val('np_name')){ toast('Name is required'); return; }
  var pid=uid();
  db.patients.push({id:pid,name:val('np_name'),age:val('np_age'),sex:val('np_sex'),
    phone:val('np_phone'),addr:val('np_addr'),ref:val('np_ref'),refPhone:val('np_refph'),
    dx:val('np_dx'),hx:val('np_hx'),all:val('np_all'),remarks:val('np_rem'),
    created:todayStr(),pathway:{}});
  touchContact(pid);
  save(); toast('Patient saved'); render();
}
function updatePatient(pid){
  var p=findP(pid); if(!p) return;
  if(!val('ep_name')){ toast('Name is required'); return; }
  p.name=val('ep_name'); p.age=val('ep_age'); p.sex=val('ep_sex');
  p.phone=val('ep_phone'); p.addr=val('ep_addr'); p.ref=val('ep_ref');
  p.refPhone=val('ep_refph'); p.dx=val('ep_dx'); p.hx=val('ep_hx');
  p.all=val('ep_all'); p.remarks=val('ep_rem');
  save(); toast('Patient updated'); render();
}
function deletePatient(pid){
  var p=findP(pid); if(!p) return;
  if(!confirm('Delete '+p.name+' and every linked record (including photos)? This cannot be undone.')) return;
  db.attachments.filter(function(a){return a.patient_id===pid;}).forEach(function(a){ imgDel(a.id); });
  db.patients=db.patients.filter(function(x){return x.id!==pid;});
  ['encounters','imaging','biopsies','treatments','appointments','followups','surgeries','implants','attachments','messages'].forEach(function(k){
    db[k]=db[k].filter(function(x){return x.patient_id!==pid;});
  });
  db.referrals.forEach(function(r){ if(r.patient_id===pid) r.patient_id=null; });
  delete db.lastContact[pid];
  save(); toast('Patient deleted'); go('patients');
}

      '<div class="foot"><button class="linkbtn" onclick="deleteRec(\'followups\',\''+f.id+'\')">Delete</button></div></div>';
  },'No follow-ups recorded.');

  /* photos & documents */
  h+='<div class="section-h">Photos &amp; documents <span class="count">'+att.length+'</span></div>';
  h+='<details class="adder"><summary>+ Add photo / report</summary><div class="body">'+
    '<div class="grid2"><div><label>Category</label><select id="at_cat">'+
      ['X-ray','MRI','CT / PET','Histopathology report','Clinical picture','Intra-operative picture','Referral document','Other document'].map(function(t){return '<option>'+t+'</option>';}).join('')+
    '</select></div>'+
    '<div><label>Date</label><input id="at_date" type="date" value="'+todayStr()+'"></div></div>'+
    '<label>Remarks</label><input id="at_note" placeholder="e.g. pre-op AP view">'+
    '<label>Photo(s) or PDF</label><input type="file" id="at_files" accept="image/*,application/pdf" multiple>'+
    '<div class="muted small" style="margin-top:8px">Photos are compressed and saved on this phone only — never uploaded.</div>'+
    '<button class="btn" style="margin-top:14px" onclick="addAttachments(\''+pid+'\')">Save files</button>'+
    '</div></details>';
  if(att.length===0){ h+='<div class="empty">No photos or documents yet.</div>'; }
  else{
    h+='<div class="thumbs">'+att.map(function(a){
      var isPdf=(a.mime||'').indexOf('pdf')>=0;
      return '<div class="thumb-w" onclick="openAttachment(\''+a.id+'\')">'+
        (isPdf?'<div class="thumb-doc"><i>📄</i><span>'+esc(a.name||'PDF')+'</span></div>'
              :'<img data-att="'+a.id+'" alt="'+esc(a.category)+'">')+
        '<span class="ttag">'+esc(catShort(a.category))+'</span>'+
        '<button class="tdl" onclick="event.stopPropagation();downloadAttachment(\''+a.id+'\')">⬇</button></div>';
    }).join('')+'</div>';
    h+='<div class="muted small" style="margin-bottom:6px">Tap to view full screen · ⬇ downloads the file.</div>';
  }

  h+='<hr class="sep"><button class="btn danger" onclick="deletePatient(\''+pid+'\')">Delete this patient and all their records</button>'+
     '<div style="height:16px"></div>';
  return h;
}

function fuQuick(code){
  var d=new Date();
  if(code==='2w') d.setDate(d.getDate()+14);
  else if(code==='1m') d.setMonth(d.getMonth()+1);
  else if(code==='3m') d.setMonth(d.getMonth()+3);
  else if(code==='6m') d.setMonth(d.getMonth()+6);
  else if(code==='1y') d.setFullYear(d.getFullYear()+1);
  var el=document.getElementById('fu_next');
  if(el) el.value=localYMD(d);
}
function deleteRec(coll,id){

/* ---- attachments ---- */
function catShort(c){
  var m={'X-ray':'XR','MRI':'MRI','CT / PET':'CT','Histopathology report':'HISTO',
    'Clinical picture':'CLIN','Intra-operative picture':'OT','Referral document':'REF','Other document':'DOC'};
  return m[c]||'DOC';
}
function addAttachments(pid){
  var inp=document.getElementById('at_files');
  var files=(inp&&inp.files)?Array.prototype.slice.call(inp.files):[];
  if(!files.length){ toast('Choose a photo or PDF first'); return; }
  var cat=val('at_cat')||'Other document', date=val('at_date')||todayStr(), note=val('at_note');
  toast('Saving '+files.length+' file'+(files.length>1?'s':'')+'…');
  var jobs=files.map(function(f){
    return compressImage(f).then(function(blob){
      var id=uid();
      return imgPut(id,blob).then(function(){
        db.attachments.push({id:id,patient_id:pid,date:date,category:cat,note:note,
          mime:(blob.type||f.type||''),name:(f.name||'')});
      });
    });
  });
  Promise.all(jobs).then(function(){
    touchContact(pid); save(); toast(files.length+' saved'); render();
  }).catch(function(){
    save(); toast('Some files could not be saved'); render();
  });
}
var _viewerUrl=null,_viewerId=null;
function openAttachment(id){
  var a=db.attachments.find(function(x){return x.id===id;}); if(!a) return;
  imgGet(id).then(function(blob){
    if(!blob){ toast('File not found on this device'); return; }
    if((a.mime||'').indexOf('pdf')>=0){
      var u=URL.createObjectURL(blob);
      window.open(u,'_blank');
      setTimeout(function(){ try{URL.revokeObjectURL(u);}catch(e){} },30000);
      return;
    }
    _viewerId=id;
    if(_viewerUrl){ try{URL.revokeObjectURL(_viewerUrl);}catch(e){} }
    _viewerUrl=URL.createObjectURL(blob);
    document.getElementById('viewerImg').src=_viewerUrl;
    document.getElementById('viewerMeta').textContent=
      a.category+' · '+fmtD(a.date)+(a.note?'\n'+a.note:'');
    document.getElementById('viewerDl').onclick=function(){ downloadAttachment(id); };
    document.getElementById('viewerDel').onclick=function(){ delFromViewer(); };
    document.getElementById('viewer').classList.add('show');
  });
}
function downloadAttachment(id){
  var a=db.attachments.find(function(x){return x.id===id;});
  imgGet(id).then(function(blob){
    if(!blob){ toast('File not found'); return; }
    var el=document.createElement('a');
    var isPdf=(blob.type||'').indexOf('pdf')>=0;
    var base=(a&&a.name)?a.name.replace(/\.[a-z0-9]+$/i,''):'ortholog-file';
    el.href=URL.createObjectURL(blob);
    el.download=base+(isPdf?'.pdf':'.jpg');
    document.body.appendChild(el); el.click();
    setTimeout(function(){ try{URL.revokeObjectURL(el.href);}catch(e){} el.remove(); },1500);
    toast('Downloaded');
  });
}
function closeViewer(){
  document.getElementById('viewer').classList.remove('show');
  if(_viewerUrl){ try{URL.revokeObjectURL(_viewerUrl);}catch(e){} _viewerUrl=null; }
  _viewerId=null;
}
function delFromViewer(){
  if(!_viewerId) return;
  if(!confirm('Delete this file?')) return;
  var id=_viewerId;
  imgDel(id);
  db.attachments=db.attachments.filter(function(x){return x.id!==id;});
  save(); closeViewer(); toast('Deleted'); render();
}

function apptFormFields(fixedPid){
  var h='';
  if(!fixedPid){
    if(db.patients.length===0)
      return '<div class="empty">Add a patient first, then schedule them here.</div>';
    h+='<label>Patient</label><select id="ap_pid">'+
      db.patients.slice().sort(function(a,b){return a.name.localeCompare(b.name);})
        .map(function(p){return '<option value="'+p.id+'">'+esc(p.name)+'</option>';}).join('')+
      '</select>';
  }
  h+='<div class="grid2"><div><label>Date &amp; time</label><input id="ap_dt" type="datetime-local"></div>'+
    '<div><label>Type</label><select id="ap_type">'+
      ['First consultation','OPD consult','Biopsy','Pre-op assessment','Surgery','Post-op visit','Suture removal','Chemo review','Follow-up','MDT'].map(function(t){return '<option>'+t+'</option>';}).join('')+
    '</select></div></div>'+
    '<label>Notes</label><textarea id="ap_notes"></textarea>';
  return h;
}
function apptRow(a,showName){
  var ready=a.img_ok&&a.path_ok&&a.surg_ok;
  var statusTone=a.status==='Done'?'green':(a.status==='Cancelled'?'gray':'blue');
  var overdue=a.status==='Scheduled'&&a.dt&&new Date(a.dt)<new Date()&&a.dt.slice(0,10)!==todayStr();
  var h='<div class="row'+(ready&&a.status==='Scheduled'?' all-ready':'')+'">'+
    '<div class="top"><span class="name">'+esc(showName?pName(a.patient_id):a.type)+'</span>'+
    '<span class="when">'+fmtDT(a.dt)+'</span></div>'+
    (showName?'<div class="muted small">'+esc(a.type)+'</div>':'')+
    (a.notes?'<div class="body-text">'+esc(a.notes)+'</div>':'');
  if(a.status==='Scheduled'){
    h+='<div class="ready-strip">'+
      readyDot(a,'img_ok','IMG')+readyDot(a,'path_ok','PATH')+readyDot(a,'surg_ok','SURG')+'</div>';
  }
  h+='<div class="foot"><span class="tag '+statusTone+'">'+esc(a.status)+'</span>'+
    (overdue?'<span class="tag red">Overdue</span>':'')+
    (ready&&a.status==='Scheduled'?'<span class="tag green">Ready</span>':'');
  if(a.status==='Scheduled'){
    h+='<button class="btn subtle mini" onclick="setAppt(\''+a.id+'\',\'Done\')">Done</button>'+
       '<button class="btn subtle mini" onclick="setAppt(\''+a.id+'\',\'Cancelled\')">Cancel</button>'+
       '<button class="btn subtle mini" onclick="exportICS(\''+a.id+'\')">+ Cal</button>';
  }
  h+='<button class="linkbtn" onclick="deleteRec(\'appointments\',\''+a.id+'\')">Delete</button>'+
     '</div></div>';
  return h;
}
function readyDot(a,key,label){
  return '<button class="rdot'+(a[key]?' on':'')+'" onclick="toggleReady(\''+a.id+'\',\''+key+'\')">'+
    '<span class="c"></span><span>'+label+'</span></button>';
}
function toggleReady(id,key){
  var a=db.appointments.find(function(x){return x.id===id;}); if(!a) return;
  a[key]=!a[key]; save(); render();
}
function setAppt(id,status){
  var a=db.appointments.find(function(x){return x.id===id;}); if(!a) return;
  a.status=status;
  if(status==='Done') touchContact(a.patient_id);
  save(); toast('Marked '+status.toLowerCase()); render();
}
function addAppointment(fixedPid){
  var pid=fixedPid||val('ap_pid');
  if(!pid){ toast('Pick a patient'); return; }
  if(!val('ap_dt')){ toast('Set a date and time'); return; }
  db.appointments.push({id:uid(),patient_id:pid,dt:val('ap_dt'),type:val('ap_type'),
    notes:val('ap_notes'),status:'Scheduled',img_ok:false,path_ok:false,surg_ok:false});
  touchContact(pid); save(); toast('Appointment saved'); render();
}
function exportICS(apptId){
  var a=db.appointments.find(function(x){return x.id===apptId;}); if(!a||!a.dt) return;
  var d=new Date(a.dt);
  var start=d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  var end=new Date(d.getTime()+3600000).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  var summary=(pName(a.patient_id)+' - '+(a.type||'Appointment')).replace(/[\n,;]/g,' ');
  var descr=(a.notes||'').replace(/[\n;]/g,' ');
  var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//OrthoLog//EN\r\nBEGIN:VEVENT\r\nUID:'+a.id+
    '@ortholog\r\nDTSTART:'+start+'\r\nDTEND:'+end+'\r\nSUMMARY:'+summary+
    '\r\nDESCRIPTION:'+descr+'\r\nEND:VEVENT\r\nEND:VCALENDAR';
  var blob=new Blob([ics],{type:'text/calendar'});
  var el=document.createElement('a');
  el.href=URL.createObjectURL(blob);
  el.download='appointment-'+(a.dt.slice(0,10))+'.ics';
  document.body.appendChild(el); el.click();
  setTimeout(function(){ try{URL.revokeObjectURL(el.href);}catch(e){} el.remove(); },1500);
  toast('Calendar file downloaded — open it to add the event');
}
function viewSchedule(){
  var sched=db.appointments.filter(function(a){return a.status==='Scheduled';})
    .sort(function(a,b){return a.dt<b.dt?-1:1;});
  var past=db.appointments.filter(function(a){return a.status!=='Scheduled';})
    .sort(function(a,b){return a.dt<b.dt?1:-1;});
  var h='<details class="adder"><summary>+ New appointment</summary><div class="body">'+
    apptFormFields(null)+
    (db.patients.length?'<button class="btn" style="margin-top:14px" onclick="addAppointment(null)">Save appointment</button>':'')+
    '</div></details>';
  h+='<div class="section-h">Scheduled <span class="count">'+sched.length+'</span></div>';
  if(sched.length===0) h+='<div class="empty">Nothing scheduled.</div>';
  sched.forEach(function(a){ h+=apptRow(a,true); });
  if(past.length){
    h+='<div class="section-h">Done / cancelled <span class="count">'+past.length+'</span></div>';
    past.slice(0,15).forEach(function(a){ h+=apptRow(a,true); });
  }
  return h;
}

  {k:'consult', n:'Book first consultation', to:'patient', stages:['consult'],
   body:'Hi [NAME], we have received your referral. Please visit [CLINIC] for your consultation with [DOC] at the earliest so we can plan your treatment. Call [PHONE] to fix a time.'},
  {k:'imaging', n:'Imaging reminder', to:'patient', stages:['imaging','bx_plan'],
   body:'Hi [NAME], this is [DOC] ([CLINIC]). Your imaging is still pending and it is important for planning your treatment. Please get it done and share the report. Call us at [PHONE] for any help.'},
  {k:'histo', n:'Histopath pending', to:'patient', stages:['histo'],
   body:'Hi [NAME], we are waiting for your biopsy report. Please collect it from the lab and send a photo here, or bring it to the clinic. — [DOC], [CLINIC]'},
  {k:'chemo', n:'Chemo cycle reminder', to:'patient', stages:['neo_chemo','adj_chemo'],
   body:'Hi [NAME], your next chemotherapy cycle is due. Please get your blood tests done and confirm your date with us at [PHONE]. — [DOC], [CLINIC]'},
  {k:'surgery', n:'Surgery instructions', to:'patient', stages:['surg_plan','surgery'],
   body:'Hi [NAME], your surgery is being planned. Please keep all reports and scans ready, and remain fasting from midnight before the surgery date we confirm. — [DOC], [CLINIC]'},
  {k:'postop', n:'Post-op / suture removal', to:'patient', stages:['postop_visit','sutures'],
   body:'Hi [NAME], your post-op check and suture removal are due. Please visit [CLINIC] this week. Call [PHONE] to fix a time. — [DOC]'},
  {k:'followup', n:'Follow-up due', to:'patient', stages:['followup'],
   body:'Hi [NAME], your regular follow-up is due. Please book a visit at [CLINIC] — early review helps us catch problems in time. Call [PHONE]. — [DOC]'},
  {k:'requiet', n:'Re-engage quiet patient', to:'patient', stages:[],
   body:'Hi [NAME], we have not heard from you in a while regarding your treatment. Your care plan should not be delayed — please call [PHONE] or reply here so we can guide the next step. — [DOC], [CLINIC]'},
  {k:'refack', n:'Referral update to doctor', to:'referrer', stages:[],
   body:'Dear [REF], thank you for referring [NAME]. Current status: [STATUS]. I will keep you posted on further management. Regards, [DOC], [CLINIC]'}
];
function fillTemplate(body,p){
  var s=db.settings||{};
  return body
    .replace(/\[NAME\]/g,p?p.name:'[NAME]')
    .replace(/\[REF\]/g,(p&&p.ref)?p.ref:'Doctor')
    .replace(/\[STATUS\]/g,p?nextAction(p):'')
    .replace(/\[DOC\]/g,s.docName||'Dr.')
    .replace(/\[CLINIC\]/g,s.clinicName||'the clinic')
    .replace(/\[PHONE\]/g,s.clinicPhone||'');
}
function waLink(phone,text){
  var d=String(phone||'').replace(/\D/g,'');
  if(d.length===10) d='91'+d;
  if(!d) return null;
  return 'https://wa.me/'+d+'?text='+encodeURIComponent(text);
}
function suggestTemplateKey(p){
  var cur=currentStage(p);
  if(!cur) return 'followup';
  var hit=TEMPLATES.find(function(t){return t.stages.indexOf(cur.k)>=0;});
  if(hit) return hit.k;
  if(lastContactDays(p)>=14) return 'requiet';
  return 'requiet';
}
function viewMessages(){
  if(db.patients.length===0){
    return '<div class="empty">Add a patient first — then generate WhatsApp reminders for them here.</div>';
  }
  var s=db.settings||{};
  var h='';
  if(!s.docName||!s.clinicPhone){
    h+='<div class="banner amber"><div><b>Set your name &amp; clinic phone once</b> in Settings so messages fill themselves in.</div></div>';
  }
  var plist=db.patients.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  var selPid=state.msgPid&&findP(state.msgPid)?state.msgPid:plist[0].id;
  var selP=findP(selPid);
  var selTpl=state.msgTpl||suggestTemplateKey(selP);

  h+='<div class="card"><div class="eyebrow">Compose reminder</div>'+
    '<label>Patient</label><select id="msg_pid" onchange="state.msgPid=this.value;state.msgTpl=null;render()">'+
    plist.map(function(p){return '<option value="'+p.id+'"'+(p.id===selPid?' selected':'')+'>'+esc(p.name)+' ('+lastContactDays(p)+'d quiet)</option>';}).join('')+
    '</select>'+
    '<label>Template <span class="muted">(suggested from care stage)</span></label>'+
    '<select id="msg_tpl" onchange="state.msgTpl=this.value;render()">'+
    TEMPLATES.map(function(t){return '<option value="'+t.k+'"'+(t.k===selTpl?' selected':'')+'>'+esc(t.n)+' → '+(t.to==='referrer'?'referring doctor':'patient')+'</option>';}).join('')+
    '</select>'+
    '<label>Message (edit freely)</label><textarea id="msg_text" style="min-height:110px"></textarea>'+
    '<div class="btn-row">'+
      '<button class="btn wa" onclick="sendWA()">Open in WhatsApp</button>'+
      '<button class="btn ghost" onclick="copyMsg()">Copy &amp; log</button>'+
    '</div>'+
    '<div class="muted small" style="margin-top:8px" id="msg_hint"></div>'+
    '</div>';

  /* bulk */
  var quiet=db.patients.filter(function(p){return lastContactDays(p)>=14;});
  h+='<div class="card"><div class="eyebrow">Bulk reminders</div>'+
    '<div class="small" style="margin-bottom:8px">'+quiet.length+' patient'+(quiet.length===1?'':'s')+' quiet for 14+ days.</div>'+
    (quiet.length?'<button class="btn ghost" onclick="buildBulk()">Generate messages for all quiet patients</button>':'<div class="muted small">Nothing to chase right now.</div>')+
    '<div id="bulkZone"></div></div>';

  /* log */
  var log=db.messages.slice().reverse().slice(0,20);
  h+='<div class="section-h">Sent log <span class="count">'+db.messages.length+'</span></div>';
  if(log.length===0) h+='<div class="empty">No messages logged yet. Sending or copying a message logs it here and resets the quiet counter.</div>';
  else h+=log.map(function(m){
    return '<div class="row"><div class="top"><span class="name">'+esc(pName(m.patient_id))+'</span>'+
      '<span class="when">'+fmtDT(m.when)+'</span></div>'+
      '<div class="small muted">To: '+esc(m.to)+'</div>'+
      '<div class="body-text">'+esc(m.text.length>140?m.text.slice(0,140)+'…':m.text)+'</div></div>';
  }).join('');
  return h;
}
function msgFill(){
  var pidEl=document.getElementById('msg_pid');
  var tplEl=document.getElementById('msg_tpl');
  var txtEl=document.getElementById('msg_text');
  if(!pidEl||!tplEl||!txtEl) return;
  var p=findP(pidEl.value);
  var t=TEMPLATES.find(function(x){return x.k===tplEl.value;})||TEMPLATES[0];
  txtEl.value=fillTemplate(t.body,p);
  var hint=document.getElementById('msg_hint');
  if(hint){
    var target=(t.to==='referrer')?(p&&p.refPhone):(p&&p.phone);
    hint.textContent=target?'Will open WhatsApp chat with '+(t.to==='referrer'?'Dr. '+(p.ref||''):p.name)+' ('+target+').'
      :'No '+(t.to==='referrer'?'referring doctor':'patient')+' phone saved — use Copy, or add the number in patient details.';
  }
}
function currentMsgContext(){
  var p=findP(val('msg_pid'));
  var t=TEMPLATES.find(function(x){return x.k===val('msg_tpl');})||TEMPLATES[0];
  var text=val('msg_text');
  return {p:p,t:t,text:text};
}
function logMessage(p,to,text){
  db.messages.push({id:uid(),patient_id:p.id,when:new Date().toISOString(),to:to,text:text});
  touchContact(p.id); save();
}
function sendWA(){
  var c=currentMsgContext();
  if(!c.p||!c.text){ toast('Nothing to send'); return; }
  var phone=(c.t.to==='referrer')?c.p.refPhone:c.p.phone;
  var link=waLink(phone,c.text);
  if(!link){ toast('No phone number saved — using Copy instead'); copyMsg(); return; }
  logMessage(c.p,(c.t.to==='referrer'?'Referring doctor':'Patient'),c.text);
  window.open(link,'_blank');
  toast('Logged & opening WhatsApp');
  render();
}
function copyMsg(){
  var c=currentMsgContext();
  if(!c.p||!c.text){ toast('Nothing to copy'); return; }
  copyText(c.text,function(){
    logMessage(c.p,(c.t.to==='referrer'?'Referring doctor':'Patient'),c.text);
    toast('Copied & logged'); render();
  });
}
function copyText(text,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(cb,function(){ fallbackCopy(text,cb); });
  }else{ fallbackCopy(text,cb); }
}
function fallbackCopy(text,cb){
  try{
    var el=document.createElement('textarea');
    el.value=text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); el.remove(); cb();
  }catch(e){ toast('Could not copy'); }
}
var _bulk=[];
function buildBulk(){
  _bulk=db.patients.filter(function(p){return lastContactDays(p)>=14;}).map(function(p){
    var tk=suggestTemplateKey(p);
    var t=TEMPLATES.find(function(x){return x.k===tk;})||TEMPLATES[0];
    return {pid:p.id,to:t.to,text:fillTemplate(t.body,p)};
  });
  var zone=document.getElementById('bulkZone');
  if(!zone) return;
  zone.innerHTML=_bulk.map(function(b,i){
    var p=findP(b.pid);
    var phone=(b.to==='referrer')?p.refPhone:p.phone;
    return '<div class="row"><div class="top"><span class="name">'+esc(p.name)+'</span>'+
      '<span class="when">'+lastContactDays(p)+' d quiet</span></div>'+
      '<div class="body-text">'+esc(b.text)+'</div>'+
      '<div class="foot">'+
      (waLink(phone,b.text)?'<button class="btn wa mini" onclick="bulkWA('+i+')">WhatsApp</button>':'')+
      '<button class="btn subtle mini" onclick="bulkCopy('+i+')">Copy &amp; log</button></div></div>';
  }).join('');
}
function bulkWA(i){
  var b=_bulk[i]; if(!b) return;
  var p=findP(b.pid); if(!p) return;
  var phone=(b.to==='referrer')?p.refPhone:p.phone;
  var link=waLink(phone,b.text);
  if(!link){ toast('No phone saved'); return; }
  logMessage(p,(b.to==='referrer'?'Referring doctor':'Patient'),b.text);
  window.open(link,'_blank');
  toast('Logged & opening WhatsApp');
}
function bulkCopy(i){
  var b=_bulk[i]; if(!b) return;
  var p=findP(b.pid); if(!p) return;
  copyText(b.text,function(){
    logMessage(p,(b.to==='referrer'?'Referring doctor':'Patient'),b.text);
    toast('Copied & logged');
  });
}

/* ================= EXCEL / backup ================= */
function exportToExcel(){
  if(typeof XLSX==='undefined'){ toast('Excel library still loading — try again in a moment'); return; }
  var wb=XLSX.utils.book_new();
  var pat=[['Name','Age','Sex','Phone','Address','Referring Dr','Referrer phone','Diagnosis','History','Allergies','Remarks','Current stage','Days since contact','Added']];
  db.patients.forEach(function(p){
    var cur=currentStage(p);
    pat.push([p.name,p.age,p.sex,p.phone,p.addr,p.ref,p.refPhone,p.dx,p.hx,p.all,p.remarks,
      cur?cur.n:'Complete',lastContactDays(p),p.created]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pat),'Patients');
  var im=[['Patient','Date','Study','Site','Findings','Stage','Status']];
  db.imaging.forEach(function(i){ im.push([pName(i.patient_id),i.date,i.mod,i.site,i.find,i.stage,i.status]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(im),'Imaging');
  var bxs=[['Patient','Date','Type','Site','Diagnosis','Grade','Margins','Details']];
  db.biopsies.forEach(function(b){ bxs.push([pName(b.patient_id),b.date,b.rtype,b.site,b.dx,b.grade,b.margins,b.det]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(bxs),'Biopsy-Histopath');
  var sg=[['Patient','Date','Procedure','Site','Approach','Findings','EBL (mL)','Time (min)','Notes']];
  db.surgeries.forEach(function(s){ sg.push([pName(s.patient_id),s.date,s.type,s.site,s.approach,s.findings,s.bloodLoss,s.time,s.notes]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sg),'Surgery');
  var imp=[['Patient','Date','Implant','Manufacturer','Serial','Size','Notes']];
  db.implants.forEach(function(i){ imp.push([pName(i.patient_id),i.date,i.implant,i.maker,i.serial,i.size,i.notes]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(imp),'Implants');
  var tr=[['Patient','Date','Type','Regimen','Cycles','Status']];
  db.treatments.forEach(function(t){ tr.push([pName(t.patient_id),t.date,t.type,t.det,t.cycles,t.status]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(tr),'Chemo-Treatment');
  var att=[['Patient','Date','Category','Note','File name']];
  db.attachments.forEach(function(a){ att.push([pName(a.patient_id),a.date,a.category,a.note,a.name]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(att),'Photos-index');
  var ms=[['Patient','When','To','Message']];
  db.messages.forEach(function(m){ ms.push([pName(m.patient_id),m.when,m.to,m.text]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ms),'Messages');
  XLSX.writeFile(wb,'ortholog-export-'+todayStr()+'.xlsx');
  db.lastBackup=Date.now(); save();
  toast('Excel exported'); render();
}
function blobToDataURL(b){
  return new Promise(function(res){
    try{
      var r=new FileReader();
      r.onload=function(){res(r.result);};
      r.onerror=function(){res(null);};
      r.readAsDataURL(b);
    }catch(e){ res(null); }
  });
}
function dataURLtoBlob(du){
  var p=du.split(',');
  var mime=(p[0].match(/data:(.*?)[;,]/)||[])[1]||'application/octet-stream';
  var bin=atob(p[1]);
  var arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function downloadJSON(obj,name){
  var blob=new Blob([JSON.stringify(obj)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ try{URL.revokeObjectURL(a.href);}catch(e){} a.remove(); },1500);
}
function exportRecords(){
  db.lastBackup=Date.now(); save();
  downloadJSON(db,'ortholog-records-'+todayStr()+'.json');
  toast('Records backup exported'); render();
}
function exportFull(){
  toast('Preparing backup…');
  var jobs=db.attachments.map(function(a){
    return imgGet(a.id).then(function(blob){
      if(!blob) return null;
      return blobToDataURL(blob).then(function(du){ return du?{id:a.id,du:du}:null; });
    });
  });
  Promise.all(jobs).then(function(list){
    var imgs={};
    list.forEach(function(x){ if(x) imgs[x.id]=x.du; });
    db.lastBackup=Date.now(); save();
    var data=JSON.parse(JSON.stringify(db));
    data.__images=imgs;
    downloadJSON(data,'ortholog-full-'+todayStr()+'.json');
    toast('Full backup exported'); render();
  }).catch(function(){ toast('Backup failed — try records-only'); });
}
function importJSON(ev){
  var f=ev.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.patients)) throw new Error('bad');
      if(!confirm('Replace ALL current data with this backup ('+d.patients.length+' patients'+
        (d.__images?', includes photos':'')+')?')){ ev.target.value=''; return; }
      var imgs=d.__images||null;
      delete d.__images;
      var s=seed();
      for(var k in s){ if(d[k]===undefined) d[k]=s[k]; }
      db=d; save();
      if(imgs){
        var ids=Object.keys(imgs);
        var jobs=ids.map(function(id){
          try{ return imgPut(id,dataURLtoBlob(imgs[id])); }
          catch(e){ return Promise.resolve(); }
        });
        Promise.all(jobs).then(function(){ toast('Backup + photos restored'); go('home'); });
      }else{
        toast('Backup restored'); go('home');
      }
    }catch(e){ toast('That file is not a valid OrthoLog backup'); }
    ev.target.value='';
  };
  r.readAsText(f);
}
function eraseAll(){
  if(!confirm('Erase every patient, record and photo from this device?')) return;
  if(!confirm('Really sure? There is no undo. Export a backup first if in doubt.')) return;
  imgClearAll();
  db=seed(); save(); toast('All data erased'); go('home');
}
function viewData(){
  var total=db.encounters.length+db.imaging.length+db.biopsies.length+db.treatments.length+
            db.surgeries.length+db.implants.length+db.appointments.length+db.followups.length;
  var h='';
  if(MEMORY_ONLY){
    h+='<div class="banner red"><div><b>Preview mode.</b> Storage is unavailable here. Open your deployed link in Chrome or Safari.</div></div>';
  }
  h+='<div class="card"><div class="eyebrow">Where your data lives</div>'+
    '<div class="small">All records and photos stay inside this browser, on this phone only. Nothing is uploaded. Export regularly — if the phone or browser data is lost, so are the records.</div>'+
    '<div class="small muted" id="storEst" style="margin-top:8px"></div></div>';
  h+='<div class="card"><div class="eyebrow">Export</div>'+
    '<div class="small" style="margin-bottom:10px">'+db.patients.length+' patients · '+total+' records · '+
    db.attachments.length+' files · Last backup: <b>'+
    (db.lastBackup?fmtD(localYMD(new Date(db.lastBackup)))+' ('+daysAgo(db.lastBackup)+' days ago)':'never')+'</b></div>'+
    '<button class="btn" onclick="exportToExcel()">Export to Excel (.xlsx, 8 sheets)</button>'+
    '<div class="btn-row">'+
    '<button class="btn ghost" onclick="exportFull()">Full backup + photos</button>'+
    '<button class="btn ghost" onclick="exportRecords()">Records only</button></div>'+
    '<button class="btn subtle" style="margin-top:8px" onclick="document.getElementById(\'importFile\').click()">Restore from backup file</button>'+
    '<div class="muted small" style="margin-top:10px">Tip: after exporting, share the file to your Google Drive from the phone\u2019s share menu — that is your off-device copy until Drive sync is built in.</div></div>';
  h+='<div class="card"><div class="eyebrow" style="color:var(--red)">Danger zone</div>'+
    '<button class="btn danger" onclick="eraseAll()">Erase all data on this device</button></div>';
  return h;
}
function fillStorageEstimate(){
  var el=document.getElementById('storEst');
  if(!el) return;
  if(typeof navigator!=='undefined'&&navigator.storage&&navigator.storage.estimate){
    navigator.storage.estimate().then(function(e){
      if(e&&e.usage!=null){
        el.textContent='Storage used: '+(e.usage/1048576).toFixed(1)+' MB'+
          (e.quota?' of ~'+Math.round(e.quota/1048576)+' MB available':'');
      }
    }).catch(function(){});
  }
}

/* ================= SETTINGS ================= */
function viewSettings(){
  var s=db.settings||{};
  var h='<div class="card"><div class="eyebrow">Message signature</div>'+
    '<div class="small" style="margin-bottom:4px">Used to auto-fill [DOC], [CLINIC] and [PHONE] in WhatsApp templates.</div>'+
    '<label>Your name (as patients see it)</label><input id="st_doc" value="'+esc(s.docName||'')+'" placeholder="e.g. Dr. Dhruv Patel">'+
    '<label>Clinic / hospital name</label><input id="st_clinic" value="'+esc(s.clinicName||'')+'">'+
    '<label>Clinic phone (shown in messages)</label><input id="st_phone" type="tel" inputmode="tel" value="'+esc(s.clinicPhone||'')+'">'+
    '<button class="btn" style="margin-top:14px" onclick="saveSettings()">Save</button></div>';
  h+='<div class="card"><div class="eyebrow">PIN lock</div>';
  if(db.pin){
    h+='<div class="small" style="margin-bottom:10px">A PIN is set. It is a basic screen lock — not encryption.</div>'+
       '<button class="btn subtle" onclick="removePin()">Remove PIN</button>';
  }else{
    h+='<div class="small" style="margin-bottom:10px">Ask for a PIN when the app opens. Keep your phone lock on too.</div>'+
       '<label>New PIN (4–8 digits)</label><input id="newPin" type="password" inputmode="numeric" maxlength="8">'+
       '<button class="btn" style="margin-top:12px" onclick="setPin()">Set PIN</button>';
  }
  h+='</div>';
  return h;
}
function saveSettings(){
  db.settings={docName:val('st_doc'),clinicName:val('st_clinic'),clinicPhone:val('st_phone')};
  save(); toast('Settings saved'); render();
}
function setPin(){
  var p=val('newPin');
  if(!/^\d{4,8}$/.test(p)){ toast('PIN must be 4–8 digits'); return; }
  db.pin=btoa(p); save(); toast('PIN set'); render();
}
function removePin(){
  if(!confirm('Remove the PIN lock?')) return;
  db.pin=null; save(); toast('PIN removed'); render();
}
function unlock(){
  var v=document.getElementById('lockPin').value;
  if(btoa(v)===db.pin){
    document.getElementById('lock').classList.remove('show');
    document.getElementById('lockPin').value='';
  }else{ toast('Wrong PIN'); }
}
function forgotPin(){
  if(confirm('Without the PIN the only option is to erase all data on this device. Erase everything?')){
    imgClearAll();
    db=seed(); save();
    document.getElementById('lock').classList.remove('show');
    go('home'); toast('Data erased — starting fresh');
  }
}

/* ================= init ================= */
if(typeof navigator!=='undefined'&&navigator.storage&&navigator.storage.persist){
  try{ navigator.storage.persist(); }catch(e){}
}
if(db.pin&&!MEMORY_ONLY){ document.getElementById('lock').classList.add('show'); }
render();
</script>
