<style>
:root{--ink:#0F5257;--ink-deep:#0A3A3E;--paper:#FAFAF8;--card:#FFFFFF;--text:#1F2933;--muted:#5C6670;--line:#E4E4DE;--amber:#B45309;--amber-bg:#FEF3E2;--green:#15803D;--green-bg:#EAF6EE;--red:#B91C1C;--red-bg:#FDECEC;--blue:#1D4ED8;--blue-bg:#EAF0FE;--purple:#7C3AED;--purple-bg:#F3E8FF}*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{font-size:16px}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--paper);color:var(--text);min-height:100vh;line-height:1.45}#app{padding-bottom:calc(80px + env(safe-area-inset-bottom))}#topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px}#topbar .menu-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px}#topbar h1{font-size:17px;font-weight:700;flex:1}#topbar .sub{font-size:10px;opacity:.8;display:block}#sidebar{position:fixed;left:0;top:0;width:240px;height:100vh;background:var(--ink-deep);color:#fff;z-index:99;transform:translateX(-100%);transition:transform .3s ease;padding-top:calc(60px + env(safe-area-inset-top));overflow-y:auto}#sidebar.show{transform:translateX(0)}#sidebar-close{position:absolute;top:12px;right:12px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px}#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;display:none}#sidebar-overlay.show{display:block}.sidebar-item{display:block;padding:13px 16px;color:#fff;text-decoration:none;border-left:3px solid transparent;font-size:14px;font-weight:500;cursor:pointer}a.sidebar-item{display:block}.sidebar-item:active,.sidebar-item.active{background:rgba(255,255,255,.1);border-left-color:#fff}main{padding:16px;max-width:100%;margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px}.card.urgent{border-left:4px solid var(--red);background:var(--red-bg)}.card.pending{border-left:4px solid var(--amber);background:var(--amber-bg)}.card.ready{border-left:4px solid var(--green);background:var(--green-bg)}.eyebrow{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink);margin-bottom:6px}.section-h{font-size:16px;font-weight:700;margin:20px 0 10px;display:flex;align-items:baseline;justify-content:space-between}.count{font-size:13px;color:var(--muted);font-weight:500}.muted{color:var(--muted);font-size:13px}.small{font-size:13px}.empty{color:var(--muted);font-size:14px;padding:18px 4px;text-align:center}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}.stat b{display:block;font-size:21px;font-weight:800;color:var(--ink)}.stat span{font-size:10px;color:var(--muted)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 18px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--ink);color:#fff;width:100%}.btn:active{transform:scale(.985)}.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--ink)}.btn.danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red)}.btn.subtle{background:#F1F1EC;color:var(--text);border:1px solid var(--line)}.btn.mini{min-height:34px;padding:5px 12px;font-size:13px;width:auto}.btn-row{display:flex;gap:8px;margin-top:10px}.btn-row .btn{flex:1}label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 4px}input,textarea,select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;background:#fff;color:var(--text)}input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink)}textarea{min-height:76px;resize:vertical}#auth-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;z-index:200}#auth-screen h1{font-size:28px;margin-bottom:4px;font-weight:800}#auth-screen .subtext{font-size:14px;opacity:.8;margin-bottom:30px}#auth-form{width:100%;max-width:280px}#auth-form input{margin-bottom:12px;width:100%}#auth-form .btn{margin-top:6px}#auth-toggle{text-align:center;margin-top:16px;font-size:13px}#auth-toggle a{color:#fff;text-decoration:underline;cursor:pointer}#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + env(safe-area-inset-bottom));z-index:170;background:var(--ink-deep);color:#fff;font-size:14px;font-weight:600;padding:10px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .25s;max-width:88%;text-align:center}#toast.show{opacity:1}#nav{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--card);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}#nav button{flex:1;background:none;border:none;padding:11px 2px 9px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;user-select:none}#nav button .pip{width:5px;height:5px;border-radius:50%;background:transparent}#nav button.active{color:var(--ink)}#nav button.active .pip{background:var(--ink)}.filter-chip{display:inline-block;background:var(--card);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px;margin-bottom:8px}.filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}.chart-container{position:relative;height:250px;margin:20px 0}.msg-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}.msg-template{border-left:4px solid var(--blue);padding:12px;background:var(--blue-bg);border-radius:8px;margin-bottom:10px}.msg-template-name{font-weight:700;color:var(--blue);margin-bottom:6px}.msg-template-text{font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word}.patient-list{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin:14px 0}.patient-item{padding:10px;border-bottom:1px solid var(--line);font-size:13px}.patient-item:last-child{border-bottom:none}.analytics-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}.analytics-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}.analytics-value{font-size:21px;font-weight:800;color:var(--ink);margin:6px 0}.analytics-desc{font-size:12px;color:var(--muted)}.referrer-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid var(--line);font-size:13px}.referrer-item:last-child{border-bottom:none}.referrer-name{font-weight:600}.referrer-count{background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}details.adder{margin-bottom:12px}details.adder>summary{list-style:none;cursor:pointer;background:var(--card);border:1.5px dashed var(--ink);color:var(--ink);border-radius:12px;padding:11px 16px;font-size:15px;font-weight:600;text-align:center;user-select:none}details.adder[open]>summary{border-style:solid;border-radius:12px 12px 0 0;background:var(--ink);color:#fff}details.adder .body{background:var(--card);border:1.5px solid var(--ink);border-top:none;border-radius:0 0 12px 12px;padding:4px 16px 16px}.banner{border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start}.banner.urgent{background:var(--red-bg);color:var(--red);border:1px solid #F2C7C7}.banner b{font-weight:700}
</style>

<body>

<div id="auth-screen" class="show">
  <h1>OrthoLog v9</h1>
  <p class="subtext">Complete Practice Management</p>
  <div id="auth-form">
    <input id="auth-email" type="email" placeholder="Email" autocomplete="email">
    <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="auth-btn" onclick="handleAuth()">Sign In</button>
    <div id="auth-toggle">
      Don't have account? <a onclick="toggleSignup()">Create one</a>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <button id="sidebar-close" onclick="toggleSidebar()">✕</button>
  <a href="#" class="sidebar-item active" onclick="nav('dashboard'); toggleSidebar(); return false">📊 Dashboard</a>
  <a href="#" class="sidebar-item" onclick="nav('analytics'); toggleSidebar(); return false">📈 Analytics</a>
  <a href="#" class="sidebar-item" onclick="nav('messaging'); toggleSidebar(); return false">💬 Messaging</a>
  <a href="#" class="sidebar-item" onclick="nav('calendar'); toggleSidebar(); return false">📅 Calendar</a>
  <a href="#" class="sidebar-item" onclick="nav('patients'); toggleSidebar(); return false">👥 Patients</a>
  <a href="#" class="sidebar-item" onclick="nav('backup'); toggleSidebar(); return false">💾 Backup</a>
  <hr class="sep" style="opacity:.3;margin:12px 0;border:none;border-top:1px solid rgba(255,255,255,.2)">
  <a href="#" class="sidebar-item" onclick="showAccount(); toggleSidebar(); return false">👤 Account</a>
  <a href="#" class="sidebar-item" onclick="logout(); return false">🚪 Sign out</a>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h1>OrthoLog<span class="sub">v9 · Messaging · Analytics</span></h1>
  </div>
  <main id="view"></main>
  <nav id="nav">
    <button data-v="dashboard" onclick="nav('dashboard')"><span class="pip"></span>Home</button>
    <button data-v="analytics" onclick="nav('analytics')"><span class="pip"></span>Analytics</button>
    <button data-v="messaging" onclick="nav('messaging')"><span class="pip"></span>Messaging</button>
    <button data-v="calendar" onclick="nav('calendar')"><span class="pip"></span>Calendar</button>
    <button data-v="backup" onclick="nav('backup')"><span class="pip"></span>Backup</button>
  </nav>
</div>

<div id="toast"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importJSON(event)">

<script>
/* ================= FIREBASE INIT ================= */
const firebaseConfig={apiKey:"AIzaSyByT9qwsZbWND_paxmuR8JyP-NrYqzRtxQ",authDomain:"my-emr-d4aa7.firebaseapp.com",projectId:"my-emr-d4aa7",storageBucket:"my-emr-d4aa7.appspot.com",messagingSenderId:"595432525175",appId:"1:595432525175:web:5fcee0c4418b0bda212572"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
db.enablePersistence().catch(function(err){});

/* ================= STATE ================= */
var state={view:'dashboard',user:null,isSignup:false,editingPid:null,calMonth:new Date(),calView:'month',messageFilter:'all',localData:{patients:[],imaging:[],biopsies:[],surgeries:[],treatments:[],appointments:[],followups:[],attachments:[],communication_log:[],reminders:[],messages:[]}};

/* ================= HELPERS ================= */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function localYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return localYMD(new Date());}
function fmtD(s){if(!s) return '—';var d=new Date(s.length===10?s+'T00:00':s);return isNaN(d)?'—':d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function fmtDT(s){if(!s) return '—';var d=new Date(s);return isNaN(d)?'—':d.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});}
function val(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1900);}
function daysAgo(ts){return Math.floor((Date.now()-new Date(ts).getTime())/86400000);}

/* ================= AUTH ================= */
auth.onAuthStateChanged(function(user){if(user){state.user={uid:user.uid,email:user.email};document.getElementById('auth-screen').classList.remove('show');document.getElementById('app').style.display='block';loadFromFirestore();setupRealtimeSync();}else{state.user=null;document.getElementById('auth-screen').classList.add('show');document.getElementById('app').style.display='none';}});

function handleAuth(){var email=val('auth-email');var pwd=val('auth-password');if(!email||!pwd){toast('Enter email and password');return;}if(state.isSignup){auth.createUserWithEmailAndPassword(email,pwd).then(function(){toast('✓ Account created');}).catch(function(err){toast('Error: '+err.message);});}else{auth.signInWithEmailAndPassword(email,pwd).then(function(){}).catch(function(err){toast('Login failed: '+err.message);});}}

function toggleSignup(){state.isSignup=!state.isSignup;document.getElementById('auth-btn').textContent=state.isSignup?'Create Account':'Sign In';document.getElementById('auth-toggle').innerHTML=state.isSignup?'Already have account? <a onclick="toggleSignup()">Sign in</a>':'Don\'t have account? <a onclick="toggleSignup()">Create one</a>';}

function logout(){if(confirm('Sign out?')){auth.signOut();}}

/* ================= FIREBASE SYNC ================= */
function loadFromFirestore(){var uid=state.user.uid;var collections=['patients','imaging','biopsies','surgeries','treatments','appointments','followups','attachments','communication_log','reminders','messages'];var loaded=0;collections.forEach(function(col){db.collection(col).where('uid','==',uid).get().then(function(snap){var items=[];snap.forEach(function(doc){items.push({...doc.data(),id:doc.id});});state.localData[col]=items;loaded++;if(loaded===collections.length){render();}});});}

function setupRealtimeSync(){var uid=state.user.uid;db.collection('patients').where('uid','==',uid).onSnapshot(function(snap){var patients=[];snap.forEach(function(doc){patients.push({...doc.data(),id:doc.id});});state.localData.patients=patients;if(state.view==='dashboard'||state.view==='patients'||state.view==='analytics') render();});}

function saveToFirestore(col,item){if(!state.user) return;item.uid=state.user.uid;var ref=db.collection(col).doc(item.id);return ref.set(item);}

/* ================= NAVIGATION ================= */
function toggleSidebar(){var sb=document.getElementById('sidebar');var so=document.getElementById('sidebar-overlay');sb.classList.toggle('show');so.classList.toggle('show');}
function nav(v){state.view=v;document.querySelectorAll('#nav button, .sidebar-item').forEach(function(b){var dv=b.getAttribute('data-v');if(dv===v) b.classList.add('active');else b.classList.remove('active');});render();window.scrollTo(0,0);}
function render(){var el=document.getElementById('view');if(state.view==='dashboard') el.innerHTML=viewDashboard();else if(state.view==='analytics') el.innerHTML=viewAnalytics();else if(state.view==='messaging') el.innerHTML=viewMessaging();else if(state.view==='calendar') el.innerHTML=viewCalendar();else if(state.view==='patients') el.innerHTML=viewPatients();else if(state.view==='backup') el.innerHTML=viewBackup();}

/* ================= DASHBOARD ================= */
function viewDashboard(){var upcoming=state.localData.appointments.filter(function(a){var d=new Date(a.dt);return d>=new Date()&&!a.completed;});var h='<div class="section-h">Dashboard</div><div class="stats"><div class="stat"><b>'+state.localData.patients.length+'</b><span>Patients</span></div><div class="stat"><b>'+state.localData.surgeries.length+'</b><span>Surgeries</span></div><div class="stat"><b>'+upcoming.length+'</b><span>Upcoming</span></div><div class="stat"><b>'+state.localData.messages.length+'</b><span>Messages sent</span></div></div>';h+='<div class="section-h">Quick actions</div>';h+='<button class="btn" onclick="nav(\'messaging\')" style="margin-bottom:8px">💬 Send bulk message</button>';h+='<button class="btn ghost" style="margin-bottom:8px" onclick="nav(\'analytics\')">📈 View analytics</button>';h+='<div class="btn-row"><button class="btn ghost" onclick="nav(\'calendar\')">📅 Calendar</button><button class="btn ghost" onclick="nav(\'patients\')">👥 Patients</button></div>';return h;}

/* ================= ANALYTICS DASHBOARD ================= */
function viewAnalytics(){var h='<div class="section-h">Analytics Dashboard</div>';h+='<div class="stats"><div class="stat"><b>'+state.localData.patients.length+'</b><span>Total patients</span></div><div class="stat"><b>'+state.localData.surgeries.length+'</b><span>Surgeries</span></div><div class="stat"><b>'+state.localData.communication_log.length+'</b><span>Contacts</span></div><div class="stat"><b>'+state.localData.messages.length+'</b><span>Messages</span></div></div>';

h+='<div class="analytics-card"><div class="analytics-label">Patients by status</div><div class="patient-list">'+getStatusSummary()+'</div></div>';

h+='<div class="analytics-card"><div class="analytics-label">Top referrers</div><div>'+getTopReferrers()+'</div></div>';

h+='<div class="analytics-card"><div class="analytics-label">Monthly statistics</div><div style="font-size:13px;color:var(--text);">Patients added this month: '+getPatientsThisMonth()+'<br>Surgeries this month: '+getSurgeriesThisMonth()+'<br>Messages sent: '+state.localData.messages.length+'</div></div>';

h+='<button class="btn" style="margin-top:14px" onclick="exportPatientCSV()">📥 Export patient list</button>';

document.getElementById('view').innerHTML=h;
}

function getStatusSummary(){var awaiting_imaging=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});return !img||!img.images_received;}).length;var ready_for_surgery=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});var biop=state.localData.biopsies.find(function(b){return b.patient_id===p.id;});return img&&img.images_received&&biop&&biop.received_date;}).length;var h='<div class="patient-item">Awaiting imaging: '+awaiting_imaging+'</div>';h+='<div class="patient-item">Ready for surgery: '+ready_for_surgery+'</div>';return h;}

function getTopReferrers(){var referrers={};state.localData.patients.forEach(function(p){if(p.ref){referrers[p.ref]=(referrers[p.ref]||0)+1;}});var sorted=Object.keys(referrers).map(function(ref){return {ref:ref,count:referrers[ref]};}).sort(function(a,b){return b.count-a.count;}).slice(0,5);return sorted.map(function(item){return '<div class="referrer-item"><span class="referrer-name">'+esc(item.ref)+'</span><span class="referrer-count">'+item.count+'</span></div>';}).join('');}

function getPatientsThisMonth(){var today=new Date();var thisMonth=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');return state.localData.patients.filter(function(p){return (p.created||'').startsWith(thisMonth);}).length;}

function getSurgeriesThisMonth(){var today=new Date();var thisMonth=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');return state.localData.surgeries.filter(function(s){return (s.actual_date||'').startsWith(thisMonth);}).length;}

function exportPatientCSV(){var csv='Patient Name,Diagnosis,Phone,Referrer,Status\n';state.localData.patients.forEach(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});var status=img&&img.images_received?'Imaging done':'Awaiting imaging';csv+=esc(p.name)+','+esc(p.dx)+','+esc(p.phone)+','+esc(p.ref)+','+status+'\n';});var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='patients-'+todayStr()+'.csv';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);toast('✓ Exported');}

/* ================= MESSAGING ================= */
function viewMessaging(){var templates=[{name:'Ready for surgery',text:'Hi [PATIENT], your surgery is scheduled. Please come one hour early. Contact: [PHONE]'},{name:'Imaging needed',text:'Hi [PATIENT], please get imaging done ASAP. This is crucial. Contact: [PHONE]'},{name:'Biopsy results',text:'Hi [PATIENT], your biopsy results are ready. Please visit us to discuss. Contact: [PHONE]'},{name:'Follow-up due',text:'Hi [PATIENT], your follow-up is due. Please schedule: [PHONE]'},{name:'Post-op reminder',text:'Hi [PATIENT], how are you feeling? If any concerns, call: [PHONE]'}];var h='<div class="section-h">Bulk Messaging</div>';h+='<div class="card"><div class="eyebrow">Filter patients</div>';h+='<div style="margin-bottom:14px"><span class="filter-chip '+(state.messageFilter==='all'?'active':'')+'\" onclick="setMessageFilter(\'all\')">All ('+state.localData.patients.length+')</span>';var awaiting_imaging=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});return !img||!img.images_received;}).length;h+='<span class="filter-chip '+(state.messageFilter==='imaging'?'active':'')+'\" onclick="setMessageFilter(\'imaging\')">Awaiting imaging ('+awaiting_imaging+')</span>';var ready=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});var biop=state.localData.biopsies.find(function(b){return b.patient_id===p.id;});return img&&img.images_received&&biop&&biop.received_date;}).length;h+='<span class="filter-chip '+(state.messageFilter==='surgery'?'active':'')+'\" onclick="setMessageFilter(\'surgery\')">Ready for surgery ('+ready+')</span></div></div>';h+='<div class="section-h">Message templates</div>';h+=templates.map(function(t){return '<div class="msg-card"><div class="msg-template"><div class="msg-template-name">'+t.name+'</div><div class="msg-template-text">'+esc(t.text)+'</div></div><button class="btn mini" style="margin-top:8px" onclick="sendBulkMessage(\''+t.name.replace(/'/g,"\\'")+'\',\''+t.text.replace(/'/g,"\\'")+'\')">Send to selected</button></div>';}).join('');h+='<div class="section-h">Message log</div>';if(state.localData.messages.length===0) h+='<div class="empty">No messages sent yet</div>';else h+=state.localData.messages.sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,10).map(function(m){return '<div class="msg-card"><div style="font-size:12px;font-weight:700">'+fmtD(m.date)+'</div><div class="small muted">Sent to '+m.count+' patients</div><div style="font-size:13px;margin-top:6px;white-space:pre-wrap">'+esc(m.text)+'</div></div>';}).join('');document.getElementById('view').innerHTML=h;}

function setMessageFilter(f){state.messageFilter=f;render();}

function sendBulkMessage(name,text){var recipients=[];if(state.messageFilter==='all') recipients=state.localData.patients;else if(state.messageFilter==='imaging') recipients=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});return !img||!img.images_received;});else if(state.messageFilter==='surgery') recipients=state.localData.patients.filter(function(p){var img=state.localData.imaging.find(function(i){return i.patient_id===p.id;});var biop=state.localData.biopsies.find(function(b){return b.patient_id===p.id;});return img&&img.images_received&&biop&&biop.received_date;});if(!confirm('Send "'+name+'" to '+recipients.length+' patients?')) return;var mid=uid();state.localData.messages.push({id:mid,date:todayStr(),name:name,text:text,count:recipients.length,recipients:recipients.map(function(p){return p.id;})});saveToFirestore('messages',state.localData.messages[state.localData.messages.length-1]);toast('✓ Message sent to '+recipients.length+' patients');render();}

/* ================= CALENDAR ================= */
function viewCalendar(){var h='<div style="text-align:center;margin-bottom:14px;"><button class="chip" style="margin-right:6px;'+(state.calView==='month'?'background:var(--ink);color:#fff':'')+'\" onclick="switchCalView(\'month\')">Month</button><button class="chip" style="'+(state.calView==='week'?'background:var(--ink);color:#fff':'')+'\" onclick="switchCalView(\'week\')">Week</button></div>';h+=(state.calView==='month')?renderMonthCal():renderWeekCal();return h;}

function switchCalView(v){state.calView=v;render();}

function renderMonthCal(){var m=state.calMonth;var y=m.getFullYear();var mo=m.getMonth();var first=new Date(y,mo,1);var last=new Date(y,mo+1,0);var startDay=first.getDay();var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><button class="btn mini ghost" onclick="prevMonth()">&lt;</button><span style="font-weight:700;font-size:16px">'+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo]+' '+y+'</span><button class="btn mini ghost" onclick="nextMonth()">&gt;</button></div>';var grid='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){grid+='<div style="font-size:10px;font-weight:700;text-align:center;color:var(--muted);padding:6px 2px">'+d+'</div>';});for(var i=0;i<startDay;i++) grid+='<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#F5F5F2;border:1px solid var(--line);color:var(--muted);border-radius:8px">'+((first.getDate()-startDay+i))+'</div>';for(var d=1;d<=last.getDate();d++){var date=new Date(y,mo,d);var dateStr=localYMD(date);var events=state.localData.appointments.filter(function(a){return (a.dt||'').slice(0,10)===dateStr;});var isToday=dateStr===todayStr();var cls='aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-weight:600;border-radius:8px;border:1px solid var(--line);background:var(--card);cursor:pointer;position:relative;font-size:13px;'+(isToday?'background:var(--blue-bg);color:var(--blue)':'')+(events.length>0?'background:var(--amber-bg);color:var(--amber)':'');grid+='<div style="'+cls+'">'+d;if(events.length>0) grid+='<span style="position:absolute;top:2px;right:2px;width:3px;height:3px;background:var(--red);border-radius:50%"></span>';grid+='</div>';}grid+='</div>';h+=grid+'</div>';return h;}

function renderWeekCal(){var today=new Date();var start=new Date(today);start.setDate(today.getDate()-today.getDay());var h='<div class="card">';for(var i=0;i<7;i++){var d=new Date(start);d.setDate(d.getDate()+i);var dateStr=localYMD(d);var events=state.localData.appointments.filter(function(a){return (a.dt||'').slice(0,10)===dateStr;});var isToday=dateStr===todayStr();var dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];h+='<div style="border-bottom:1px solid var(--line);padding:12px;'+(isToday?'background:var(--blue-bg)':'')+'"><div style="font-weight:700;color:'+(isToday?'var(--blue)':'var(--text)')+'">'+dayName+'</div><div class="small muted">'+fmtD(dateStr)+'</div>';if(events.length===0) h+='<div class="muted small" style="margin-top:6px">No appointments</div>';else events.forEach(function(evt){var p=state.localData.patients.find(function(x){return x.id===evt.patient_id;});h+='<div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px;font-size:12px"><b>'+esc(p?p.name:'(deleted)')+'</b><br>'+fmtDT(evt.dt)+'<br>'+evt.type+'</div>';});h+='</div>';}h+='</div>';return h;}

function prevMonth(){state.calMonth=new Date(state.calMonth.getFullYear(),state.calMonth.getMonth()-1,1);render();}
function nextMonth(){state.calMonth=new Date(state.calMonth.getFullYear(),state.calMonth.getMonth()+1,1);render();}

/* ================= PATIENTS ================= */
function viewPatients(){var h='<div class="section-h">All patients <span class="count">'+state.localData.patients.length+'</span></div>';if(state.localData.patients.length===0) h+='<div class="empty">No patients yet.</div>';else h+=state.localData.patients.sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(p){return '<div class="card"><div style="display:flex;justify-content:space-between"><span style="font-weight:700">'+esc(p.name)+'</span></div><div class="small muted">'+esc(p.dx)+'</div><button class="btn subtle mini" style="margin-top:8px" onclick="alert(\'Open patient detail view in v8+\')">View</button></div>';}).join('');document.getElementById('view').innerHTML=h;}

/* ================= BACKUP ================= */
function viewBackup(){var h='<div class="card"><div class="eyebrow">Backup</div><p class="small muted">Your data syncs automatically to cloud.</p><button class="btn" onclick="exportJSON()">📥 Export backup</button><button class="btn subtle" style="margin-top:8px" onclick="document.getElementById(\'importFile\').click()">📤 Import backup</button></div>';document.getElementById('view').innerHTML=h;}

function exportJSON(){var data={patients:state.localData.patients,imaging:state.localData.imaging,biopsies:state.localData.biopsies,surgeries:state.localData.surgeries,treatments:state.localData.treatments,appointments:state.localData.appointments,followups:state.localData.followups,attachments:state.localData.attachments,communication_log:state.localData.communication_log,messages:state.localData.messages};var blob=new Blob([JSON.stringify(data)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ortholog-backup-'+todayStr()+'.json';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);toast('✓ Exported');}

function importJSON(ev){var f=ev.target.files[0];if(!f) return;var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(!confirm('Import and merge data?')) return;Object.keys(d).forEach(function(k){if(state.localData[k]) state.localData[k]=d[k]||[];});toast('✓ Imported');nav('dashboard');}catch(e){toast('Invalid file');}ev.target.value='';};r.readAsText(f);}

function showAccount(){var h='<div class="card"><div class="eyebrow">Account</div><p>Logged in as:<br><b>'+esc(state.user.email)+'</b></p><p class="small muted" style="margin-top:12px">Multi-device sync enabled. All data synced to cloud.</p></div>';document.getElementById('view').innerHTML=h;}

nav('dashboard');
</script>
</body>
</html>
